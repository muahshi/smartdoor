<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Smart Door — Visitor Experience" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#060d1a" />
  <title>Smart Door</title>
  <link rel="icon" href="/images/favicon.ico" />
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: #03080a;
      color: #e2ecf4;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Cinematic background — real photo ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url('/images/visitor-background.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      /* No stretching. No repeating. No white edges. */
    }
    /* Dark luxury overlay — keeps cards readable on any photo */
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(3, 8, 18, 0.55);
    }

    /* ── Shell ── */
    .shell {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* ── Loading ── */
    .loading-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,162,232,0.15);
      border-top-color: #00A2E8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    .visitor-header {
      padding: 28px 20px 20px;
      text-align: center;
      position: relative;
    }
    .sd-logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px;
    }
    .sd-logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #D4AF37, #F4D160);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(212,175,55,0.55), 0 4px 16px rgba(200,160,40,0.4);
    }
    .sd-logo-text {
      display: flex; flex-direction: column; text-align: left;
    }
    .sd-logo-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 1.1rem; letter-spacing: 1.5px;
      color: #E8C040;
      text-shadow: 0 0 18px rgba(212,175,55,0.45);
    }
    .sd-logo-tagline {
      font-size: 0.6rem; letter-spacing: 1.5px; color: rgba(232,192,64,0.78);
      text-transform: uppercase; font-weight: 600;
    }
    .welcome-label {
      font-size: 0.9rem; color: rgba(226,236,244,0.75); font-weight: 400;
      margin-bottom: 6px; letter-spacing: 0.3px;
    }
    .owner-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.9rem; font-weight: 800;
      color: #29B6F6;
      text-shadow: 0 0 20px rgba(41,182,246,0.3);
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .owner-sub {
      font-size: 0.82rem; color: rgba(226,236,244,0.65);
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.73rem; font-weight: 600; letter-spacing: 0.3px;
      margin-top: 12px;
    }
    .status-badge.status-available { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .status-badge.status-busy      { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }
    .status-badge.status-dnd       { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: dotPulse 2s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

    /* ── Section divider ── */
    .section-divider {
      margin: 0 20px 12px;
      border: none; border-top: 1px solid rgba(0,162,232,0.1);
    }

    /* ── Action buttons ── */
    .actions-wrap {
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 16px;
    }
    .action-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.085);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      cursor: pointer; color: inherit; text-align: left;
      transition: all 0.2s; width: 100%;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      position: relative; overflow: hidden;
    }
    .action-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,162,232,0.1) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .action-btn:hover:not(:disabled)::before { opacity: 1; }
    .action-btn:hover:not(:disabled) {
      border-color: rgba(0,162,232,0.4);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .action-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .action-btn.primary-action {
      background: rgba(0,162,232,0.16);
      border-color: rgba(0,162,232,0.4);
    }
    .action-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .action-title { font-weight: 700; font-size: 0.95rem; color: #ffffff; margin-bottom: 2px; letter-spacing: 0.2px; }
    .action-sub   { font-size: 0.76rem; color: rgba(226,236,244,0.7); }
    .action-arrow { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-left: auto; flex-shrink: 0; }
    .action-tag   { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.8px; color: #4fc3f7; flex-shrink: 0; }

    /* SOS */
    .action-btn.sos-btn {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
    }
    .action-btn.sos-btn .action-icon {
      background: linear-gradient(135deg,rgba(239,68,68,0.3),rgba(185,28,28,0.2));
      border: 1px solid rgba(239,68,68,0.4);
    }
    .action-btn.sos-btn:hover:not(:disabled) { border-color: rgba(239,68,68,0.5); }
    .sos-btn .sos-label { font-weight: 700; letter-spacing: 1.5px; color: #f87171; font-size: 0.8rem; }
    .action-btn.holding .action-icon { animation: sosPulse 0.4s ease-in-out infinite; }
    @keyframes sosPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

    /* ── AI Chat Section ── */
    .ai-section {
      margin: 8px 16px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,162,232,0.28);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
    }
    .ai-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(0,162,232,0.18);
      background: rgba(0,162,232,0.08);
    }
    .ai-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg,#00A2E8,#0066cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,162,232,0.4);
      position: relative;
    }
    .ai-avatar::after {
      content: ''; position: absolute;
      bottom: 1px; right: 1px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; border: 2px solid #060d1a;
    }
    .ai-header-text { flex: 1; }
    .ai-name { font-weight: 700; font-size: 0.85rem; color: #e2ecf4; }
    .ai-status-text { font-size: 0.7rem; color: rgba(0,162,232,0.7); }
    .ai-groq-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
      color: rgba(0,162,232,0.6); border: 1px solid rgba(0,162,232,0.2);
      padding: 2px 8px; border-radius: 8px;
    }
    .voice-toggle {
      background: none; border: 1px solid rgba(0,162,232,0.25);
      border-radius: 8px; padding: 4px 10px;
      color: rgba(0,162,232,0.7); font-size: 0.68rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .voice-toggle.active {
      background: rgba(0,162,232,0.15); border-color: rgba(0,162,232,0.4);
      color: #00A2E8;
    }

    /* Chat messages */
    .chat-messages {
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      min-height: 120px; max-height: 260px; overflow-y: auto;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,162,232,0.2); border-radius: 2px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 82%; padding: 9px 13px;
      border-radius: 16px; font-size: 0.83rem; line-height: 1.45;
      position: relative;
    }
    .msg-row.ai .msg-bubble {
      background: rgba(0,162,232,0.12);
      border: 1px solid rgba(0,162,232,0.2);
      border-bottom-left-radius: 4px;
      color: #c8dff0;
    }
    .msg-row.user .msg-bubble {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.2);
      border-bottom-right-radius: 4px;
      color: #a7f3c0;
    }
    .msg-row.thinking .msg-bubble {
      background: rgba(0,162,232,0.07);
      border: 1px solid rgba(0,162,232,0.12);
    }
    /* ai-subtitle: smaller, dimmer bubble for English translation under Hinglish */
    .msg-row.ai-subtitle .msg-bubble {
      background: rgba(0,162,232,0.06);
      border: 1px dashed rgba(0,162,232,0.15);
      border-bottom-left-radius: 4px;
      color: rgba(200,223,240,0.55);
      font-size: 0.73rem;
      font-style: italic;
      margin-top: -6px;
    }
    .msg-meta { font-size: 0.6rem; color: rgba(255,255,255,0.2); margin-top: 2px; text-align: center; }
    .seen-tick { margin-left: 4px; color: rgba(255,255,255,0.25); transition: color 0.3s; }

    .intent-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 10px; font-size: 0.72rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* Typing dots */
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,162,232,0.5); margin: 0 2px;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Chat input */
    .chat-input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid rgba(0,162,232,0.1);
      background: rgba(0,0,0,0.2);
    }
    .chat-input {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 9px 13px; color: #e2ecf4; font-size: 0.83rem;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: rgba(0,162,232,0.35); }
    .chat-input::placeholder { color: rgba(255,255,255,0.2); }
    .chat-send {
      background: linear-gradient(135deg,#00A2E8,#0077cc);
      border: none; border-radius: 10px;
      width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; color: #fff; font-size: 1rem;
    }
    .chat-send:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,162,232,0.4); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .mic-btn {
      background: rgba(0,162,232,0.1); border: 1px solid rgba(0,162,232,0.25);
      border-radius: 10px; width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; transition: all 0.2s; color: #00A2E8;
    }
    .mic-btn.recording { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; animation: micPulse 1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }

    /* ── Banners ── */
    .night-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; margin: 0 16px 8px;
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px;
    }
    .expiry-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; margin: 0 16px 8px;
      border-radius: 12px;
    }
    .expiry-banner.grace  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); }
    .expiry-banner.locked { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  }

    /* ── Voice recording bar ── */
    #voice-bar {
      display: none; margin: 0 16px 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px; align-items: center; gap: 10px;
    }
    #voice-bar.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; animation: recPulse 1s ease-in-out infinite; }
    @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Footer ── */
    .visitor-footer {
      margin-top: auto; padding: 16px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer-lock {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-bottom: 8px;
    }
    .footer-powered {
      font-size: 0.62rem; color: rgba(255,255,255,0.15); letter-spacing: 1px;
      text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Pending screen ── */
    .pending-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 12px;
    }
    .pending-icon { font-size: 3rem; margin-bottom: 8px; }
    .pending-title { font-family: 'Space Grotesk',sans-serif; font-size: 1.3rem; font-weight: 700; }
    .pending-sub   { font-size: 0.83rem; color: rgba(226,236,244,0.5); line-height: 1.5; max-width: 280px; }
    .pending-stage { font-size: 0.75rem; color: rgba(0,162,232,0.6); padding: 6px 14px; border: 1px solid rgba(0,162,232,0.2); border-radius: 10px; }

    /* ── Unified Message panel ── */
    .text-msg-panel {
      margin: 0 16px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      display: none;
    }
    .text-msg-panel.open { display: block; }
    .msg-mode-tabs { display: flex; gap: 6px; padding: 12px 14px 0; }
    .msg-mode-tab {
      flex: 1; padding: 8px 10px; border-radius: 9px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(226,236,244,0.6); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .msg-mode-tab.active {
      background: rgba(0,162,232,0.18); border-color: rgba(0,162,232,0.4); color: #4fc3f7;
    }
    .text-msg-body {
      display: flex; padding: 14px; flex-direction: column; gap: 8px;
    }
    .text-msg-body textarea {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 10px; padding: 10px 12px;
      color: #ffffff; font-family: 'Inter', sans-serif;
      font-size: 0.88rem; resize: none; outline: none;
      min-height: 72px; line-height: 1.5;
    }
    .text-msg-body textarea::placeholder { color: rgba(226,236,244,0.45); }
    .text-msg-body textarea:focus { border-color: rgba(0,162,232,0.5); }
    .text-msg-send {
      align-self: flex-end;
      background: linear-gradient(135deg,#00A2E8,#0066cc);
      border: none; border-radius: 9px;
      padding: 8px 18px; color: #fff; font-weight: 600; font-size: 0.84rem;
      cursor: pointer; transition: opacity 0.2s;
    }
    .text-msg-send:disabled { opacity: 0.45; cursor: not-allowed; }
    .voice-record-btn {
      width: 100%; padding: 22px 16px; border-radius: 12px;
      background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3);
      color: #c4b5fd; font-size: 0.88rem; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .voice-record-btn #voice-record-icon { font-size: 1.8rem; }
    .voice-record-btn.recording { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.1); color: #fca5a5; }

    /* Bell ring animation on dashboard — keyframe for btn */
    @keyframes bellShake {
      0%,100% { transform: rotate(0); }
      20% { transform: rotate(-15deg); }
      40% { transform: rotate(15deg); }
      60% { transform: rotate(-10deg); }
      80% { transform: rotate(10deg); }
    }
    .bell-ringing { animation: bellShake 0.6s ease-in-out; }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 12px;
      font-size: 0.82rem; font-weight: 600; z-index: 9999;
      white-space: nowrap; animation: toastIn 0.3s ease;
      backdrop-filter: blur(12px);
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .toast.success { background: rgba(22,163,74,0.85); border: 1px solid rgba(34,197,94,0.4); color:#fff; }
    .toast.error   { background: rgba(185,28,28,0.85); border: 1px solid rgba(239,68,68,0.4); color:#fff; }
    .toast.info    { background: rgba(0,50,80,0.9);    border: 1px solid rgba(0,162,232,0.3); color:#7FD3FF; }
  </style>
</head>
<body>
<div class="bg-layer"></div>

<script src="config/env.generated.js?v=2"></script>
<script type="module" src="js/monitoring-bootstrap.js"></script>

<div class="shell" id="shell">
  <div class="loading-wrap" id="loading-state">
    <div class="spinner"></div>
    <div style="font-size:0.8rem;color:rgba(255,255,255,0.35);margin-top:4px;">Loading Smart Door…</div>
  </div>
</div>

<script type="module">
  import { getFamilyMembersForSos } from './services/visitorExperience.js';
  import { supabase } from './services/supabase.js';
  import { initiateMaskedCall, sendTextMessage, triggerEmergency } from './services/communication.js';
  import { notifyBellRing } from './services/notifications.js';
  import { VoiceRecorder, uploadVoiceNote } from './services/voiceNotes.js';
  import { subscribeToStatusChanges } from './services/plates.js';
  import { isNightModeActive } from './services/security.js';
  import { getOrCreateConversation, sendMessage as sendConvMessage, sendVoiceMessage as sendConvVoiceMessage, getConversationMessages, subscribeToConversation, sendTypingSignal } from './services/messaging.js';
  import { attemptTapToTalk } from './services/webrtcCall.js';
  import { recordVisitorVisit, getVisitorRecognition } from './services/visitorMemory.js';
  import { visitorCallUI } from './js/visitorCallUI.js';

  const shell = document.getElementById('shell');

  // Phase 2 — WebRTC Tap to Talk. Hidden <audio> element for the owner's
  // remote voice stream when a WebRTC call connects. Created once, up
  // front, so it exists regardless of which branch of bindActions()
  // later runs. Not rendered by the shell template — additive only,
  // doesn't touch any existing markup.
  const rtcRemoteAudio = document.createElement('audio');
  rtcRemoteAudio.id = 'rtc-remote-audio';
  rtcRemoteAudio.autoplay = true;
  rtcRemoteAudio.setAttribute('playsinline', '');
  rtcRemoteAudio.style.display = 'none';
  document.body.appendChild(rtcRemoteAudio);
  visitorCallUI.attachRemoteAudio(rtcRemoteAudio);

  // Extract plate slug from BOTH sources:
  // 1. Query param: visitor.html?plate=SD-UMBAU4 (direct URL)
  // 2. Path: /p/SD-UMBAU4 (Vercel rewrite — browser sees path, not ?plate=)
  const params = new URLSearchParams(window.location.search);
  const slugFromQuery = params.get('plate') || '';
  const slugFromPath  = (window.location.pathname.match(/\/p\/([A-Z0-9-]+)/i) || [])[1] || '';
  const plateSlug = (slugFromQuery || slugFromPath).trim().toUpperCase();

  // ── TTS: AI receptionist voice — owner picks male or female (default female) ──
  let voiceEnabled = true; // Default ON — auto-speak after user's first interaction (browser gesture)
  let speechSynth = window.speechSynthesis;
  let hindiVoice = null;
  let aiVoiceGender = 'female'; // set from owner.profile.aiVoiceGender once state loads

  function initVoice() {
    if (!speechSynth) return;
    const tryFind = () => {
      const voices = speechSynth.getVoices();
      const wantMale = aiVoiceGender === 'male';
      const genderWord = wantMale ? 'male' : 'female';
      // Priority: Hindi voice matching gender > Hindi (any) > Indian English
      // matching gender > Indian English (any) > Google Hindi.
      // Most platforms only expose one or two hi-IN voices, so "matching
      // gender" filters by name hint; if none found we still fall back to
      // whatever Hindi voice IS available rather than silence.
      hindiVoice =
        voices.find(v => v.lang === 'hi-IN' && v.name.toLowerCase().includes(genderWord)) ||
        (wantMale
          ? voices.find(v => v.lang === 'hi-IN' && !v.name.toLowerCase().includes('female'))
          : null) ||
        voices.find(v => v.lang === 'hi-IN') ||
        voices.find(v => v.lang.startsWith('hi')) ||
        voices.find(v => v.lang === 'en-IN' && v.name.toLowerCase().includes(genderWord)) ||
        voices.find(v => v.lang === 'en-IN') ||
        null;
    };
    tryFind();
    speechSynth.onvoiceschanged = tryFind;
  }

  // Call this once owner.profile.aiVoiceGender is known (after state loads),
  // and again if it ever changes mid-session.
  function setAIVoiceGender(gender) {
    aiVoiceGender = gender === 'male' ? 'male' : 'female';
    initVoice();
  }

  function speak(text, lang = 'hi-IN') {
    if (!voiceEnabled || !speechSynth) return;
    speechSynth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 0.92;
    utt.pitch = aiVoiceGender === 'male' ? 0.88 : 1.05;
    utt.volume = 1;
    if (hindiVoice) utt.voice = hindiVoice;
    speechSynth.speak(utt);
  }

  // autoSpeak — plays audio regardless of voiceEnabled toggle.
  // Used for the opening greeting only. Requires a prior user gesture
  // (browser autoplay policy). Falls back silently if no gesture yet.
  function autoSpeak(text, lang = 'hi-IN') {
    if (!speechSynth) return;
    try {
      speechSynth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = lang;
      utt.rate = 0.90;
      utt.pitch = aiVoiceGender === 'male' ? 0.88 : 1.05;
      utt.volume = 1;
      if (hindiVoice) utt.voice = hindiVoice;
      speechSynth.speak(utt);
    } catch { /* browser blocked autoplay — silently ignore */ }
  }

  // detectLang — returns 'hi-IN', 'hi-IN' (Hinglish Roman), or 'en-IN'
  // Based on presence of Devanagari script or common Hinglish romanised words.
  function detectLang(text) {
    if (!text) return 'hi-IN';
    // Devanagari Unicode block
    if (/[\u0900-\u097F]/.test(text)) return 'hi-IN';
    // Common Hinglish / Roman Hindi markers
    const hinglishWords = /\b(kya|hai|hoon|aap|main|mujhe|yahan|thik|accha|nahi|abhi|bhai|didi|ji|kaisa|bahut|aana|jana|karo|karo|mera|tera|humara|tumhara|ghar|bahar|andar|sahib|madam|paisa|kaam|shukriya|namaste|theek)\b/i;
    if (hinglishWords.test(text)) return 'hi-IN';
    return 'en-IN';
  }

  // Map English AI responses to Hindi TTS
  function toHindi(englishText, intent) {
    const map = {
      'Delivery':         'Aapka parcel sweekar kar liya gaya hai. Maalik ko soochana de di gayi hai. Dhanyavaad!',
      'Emergency / SOS':  'Aapaat sthiti detect hui hai! Maalik aur parivaar ke sadasyon ko turant soochit kiya ja raha hai. Shant rahein!',
      'Spam / Promotional': 'Khed hai, hum promotional ya vikray nivedan sweekar nahi karte. Kripya official channels se sampark karein.',
      'Known Guest / Family': 'Swagat hai! Maalik ko aapke aane ki soochana de di gayi hai. Kripya thoda pratiksha karein.',
      'General Visitor':  'Aapka swagat hai! Maalik ko soochana de di gayi hai. Kripya thodi der pratiksha karein.',
    };
    return map[intent] || 'Namaste! Aapka Smart Door mein swagat hai. Maalik ko soochana de di gayi hai.';
  }

  initVoice();

  let state = null;
  let unsubscribeStatus = null;

  // ── UNIFIED CONVERSATION (Phase 4) ──
  // One thread ties together: AI chat turns, "Leave a Message" text, and
  // voice notes — so the owner's Inbox shows everything from this visitor
  // session in one place, even though (per the "do not redesign" rule in
  // the Phase 4 spec) the visitor page keeps its existing two widgets
  // (Leave a Message panel + AI Chat) visually separate.
  let conversationId = null;
  let _convReady = null;
  function ensureConversation(ownerId, plateId) {
    if (_convReady) return _convReady;
    _convReady = getOrCreateConversation({ ownerId, plateId }).then((r) => {
      if (r.success) {
        conversationId = r.conversationId;
        // Live owner replies — show up in the AI chat feed if the visitor
        // is still on the page (realtime, no polling/refresh).
        subscribeToConversation(conversationId, (msg) => {
          if (msg.sender_type !== 'owner') return;
          appendAIMsg(msg.message_type === 'voice' ? '🎤 Owner sent a voice reply' : msg.text, 'ai', '#00A2E8');
          if (voiceEnabled && msg.message_type === 'text' && msg.text) speak(msg.text, detectLang(msg.text));
          showToast('💬 Owner replied', 'success');
        });
      }
      return r;
    });
    return _convReady;
  }

  // Wait for __SD_CONFIG__ to be available before init
  // env.generated.js loads via <script src> before this module,
  // but on slow connections it may not be parsed yet.
  function waitForConfig(cb, tries = 0) {
    if (window.__SD_CONFIG__?.supabaseUrl) { cb(); return; }
    if (tries > 20) { renderNotFound(); return; } // 2s timeout
    setTimeout(() => waitForConfig(cb, tries + 1), 100);
  }

  waitForConfig(init);

  async function init() {
    if (!plateSlug) { renderNotFound(); return; }

    try {
      // Fetch owner_id + status. Status is now checked (see renderSuspended
      // below) — previously this deliberately skipped the check, which meant
      // a suspended plate's QR still showed the full visitor experience.
      // Try qr_slug first, fallback to plate_id
      let plate = null;
      let plateErr = null;

      const res1 = await supabase
        .from('plates')
        .select('id, plate_id, qr_slug, product_type, owner_id, status')
        .eq('qr_slug', plateSlug)
        .maybeSingle();

      if (res1.data) {
        plate = res1.data;
      } else {
        const res2 = await supabase
          .from('plates')
          .select('id, plate_id, qr_slug, product_type, owner_id, status')
          .eq('plate_id', plateSlug)
          .maybeSingle();
        plate = res2.data;
        plateErr = res2.error;
      }

      if (plateErr || !plate || !plate.owner_id) {
        renderNotFound();
        return;
      }

      if (plate.status === 'suspended') {
        renderSuspended();
        return;
      }

      // Fetch owner name + profile + security rules in parallel
      const [ownerRes, rulesRes] = await Promise.all([
        supabase.rpc('get_owner_display_for_plate', { p_plate_id: plate.plate_id }),
        supabase
          .from('security_rules')
          .select('night_mode_on, night_mode_start, night_mode_end, allow_sos, allow_voice, allow_calls, call_forwarding, current_status, custom_message, residence_name, family_name, welcome_message, owner_display_name, ai_name, greeting_style, preferred_language, visitor_greeting, visitor_welcome_title, auto_reply_enabled, emergency_behaviour')
          .eq('owner_id', plate.owner_id)
          .maybeSingle(),
      ]);

      const ownerRow = Array.isArray(ownerRes.data) ? ownerRes.data[0] : ownerRes.data;

      state = {
        success: true,
        plate: { id: plate.id, plateId: plate.plate_id, productType: plate.product_type },
        owner: {
          id: plate.owner_id,
          name: ownerRow?.full_name || 'Resident',
          profile: {
            residenceName:     ownerRow?.residence_name || null,
            familyName:        ownerRow?.family_name || null,
            welcomeMessage:    ownerRow?.welcome_message || null,
            ownerDisplayName:  ownerRow?.owner_display_name || ownerRow?.full_name || 'Resident',
            aiName:            ownerRow?.ai_name || 'Priya',
            aiVoiceGender:     ownerRow?.ai_voice_gender || 'female',
            greetingStyle:     ownerRow?.greeting_style || 'warm',
            preferredLanguage: ownerRow?.preferred_language || 'hinglish',
            visitorGreeting:      ownerRow?.visitor_greeting || null,
            visitorWelcomeTitle:  ownerRow?.visitor_welcome_title || null,
          },
        },
        securityRules: rulesRes.data || {
          night_mode_on: false, allow_sos: true, allow_voice: true,
          allow_calls: true, call_forwarding: true,
          current_status: 'available', custom_message: null,
        },
        access: { allowCall: true, allowVoice: true, allowSos: true, allowText: true },
      };

      setAIVoiceGender(state.owner.profile.aiVoiceGender);

      // Log scan async — never block render.
      // Also opens/reuses the unified conversation right away (Phase 4b) so
      // a QR scan is the FIRST thing in the timeline, before any bell/
      // message/AI-chat turn — and the scan itself gets a conversation_id
      // so its OS notification can deep-link into the exact thread.
      ensureConversation(plate.owner_id, plate.plate_id).then((cr) => {
        const convId = cr.success ? cr.conversationId : null;
        // Explicit id (Phase 4c) — reused as the push notification's tag,
        // avoiding a select-after-insert round trip anon can't do anyway.
        const rowId = crypto.randomUUID();
        supabase.from('visitor_logs').insert({
          id: rowId, owner_id: plate.owner_id, plate_id: plate.plate_id,
          event_type: 'qr_scan', user_agent: navigator.userAgent,
          conversation_id: convId,
        }).then(() => {});
        if (convId) {
          sendConvMessage({
            conversationId: convId, ownerId: plate.owner_id, plateId: plate.plate_id,
            senderType: 'system', text: '📲 Visitor opened the Smart Door page (QR scan)',
          }).catch(() => {});
        }
        _triggerPush(plate.owner_id, plate.plate_id, 'qr_scan', rowId, convId);
      });

      renderVisitorExperience(state);

      unsubscribeStatus = subscribeToStatusChanges(state.owner.id, (rules) => {
        state.securityRules = { ...state.securityRules, ...rules };
        updateStatusBadge();
        updateNightBanner();
      });

    } catch (err) {
      console.error('[visitor] init error:', err);
      renderNotFound();
    }
  }

  // ── Visitor fingerprint (for "returning visitor" memory, privacy-safe) ──
  function _getVisitorFingerprint() {
    try {
      let fp = localStorage.getItem('sd_visitor_fp');
      if (!fp) {
        fp = 'v_' + Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b => b.toString(16).padStart(2,'0')).join('');
        localStorage.setItem('sd_visitor_fp', fp);
      }
      return fp;
    } catch (_) {
      return 'v_anon_' + Date.now();
    }
  }

  // ── Greeting variation pools (never repeats the same sentence) ──
  const GREETING_POOLS = {

  function _pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ── AI Chat Receptionist ──
  async function initAIChat(s) {
    const profile = s.owner.profile || {};
    const aiName = profile.aiName || 'Priya';
    const ownerFirst = (profile.familyName || s.owner.name || 'the resident').split(' ')[0];
    const style = GREETING_POOLS[profile.greetingStyle] ? profile.greetingStyle : 'warm';

    // Check visitor memory — returning visitor recognition
    let memoryNote = null;
    try {
      const fp = _getVisitorFingerprint();
      const { data: memData } = await supabase.rpc('remember_visitor', {
        p_owner_id: s.owner.id, p_plate_id: s.plate.plateId, p_fingerprint: fp, p_intent: null,
      });
      const mem = Array.isArray(memData) ? memData[0] : memData;
      if (mem?.is_returning) {
        if (mem.visit_count > 3 && mem.visitor_label) {
          memoryNote = `Welcome back! 👋 Aap pehle bhi (${mem.visitor_label}) aa chuke hain — Aapko pehchaan liya gaya hai.`;
        } else {
          memoryNote = `Welcome back! 👋 Aap dobara aaye hain — accha laga!`;
        }
      }
    } catch (e) { console.warn('[visitor] memory check failed', e); }

    // Use owner's custom visitor greeting if set, otherwise generate varied greeting
    let hinglishGreeting, englishSubtitle;
    if (profile.visitorGreeting) {
      hinglishGreeting = _esc(profile.visitorGreeting);
      englishSubtitle = `I'm ${_esc(aiName)}, AI receptionist for ${_esc(ownerFirst)}. You can speak Hindi, Hinglish, or English!`;
    } else {
      const hinglishFn = _pickRandom(GREETING_POOLS[style].hinglish);
      const englishFn  = _pickRandom(GREETING_POOLS[style].english);
      hinglishGreeting = hinglishFn(_esc(aiName), _esc(ownerFirst));
      englishSubtitle  = englishFn(_esc(aiName), _esc(ownerFirst));
    }

    // Status-aware addendum — tells visitor what to expect right away
    const statusAddendum = _statusAwareNote(s.securityRules?.current_status, s.securityRules?.custom_message);

    if (memoryNote) appendAIMsg(memoryNote, 'ai-subtitle');
    appendAIMsg(hinglishGreeting, 'ai');
    appendAIMsg(englishSubtitle, 'ai-subtitle');
    if (statusAddendum) appendAIMsg(statusAddendum, 'ai-subtitle');

    // Auto-speak the greeting — works after any user gesture on the page.
    // Voice toggle button is shown so user can enable for subsequent replies.
    autoSpeak(hinglishGreeting, 'hi-IN');

    const sendBtn = document.getElementById('ai-send');
    const input   = document.getElementById('ai-input');
    const micBtn  = document.getElementById('mic-btn');

    sendBtn?.addEventListener('click', () => handleAISend(s));
    input?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAISend(s); } });

    // Speech recognition (mic button)
    let recognition = null;
    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'hi-IN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = (e) => {
        input.value = e.results[0][0].transcript;
        micBtn.classList.remove('recording');
        micBtn.title = 'Speak your message';
      };
      recognition.onerror = () => { micBtn.classList.remove('recording'); };
      recognition.onend = () => { micBtn.classList.remove('recording'); };
    }

    micBtn?.addEventListener('click', () => {
      if (!recognition) { showToast('Speech recognition not supported in this browser', 'info'); return; }
      if (micBtn.classList.contains('recording')) {
        recognition.stop(); micBtn.classList.remove('recording');
      } else {
        recognition.start(); micBtn.classList.add('recording');
        micBtn.title = 'Listening…';
      }
    });
  }

  // ── Owner-status-aware note shown immediately on chat load ──
  function _statusAwareNote(status, customMessage) {
    if (customMessage) return null; // owner already has a custom message shown in the header badge
    const notes = {
      busy:          'Owner is currently busy. Would you like to leave a message?',
      meeting:       'Owner is in a meeting right now. Please leave a message and they\'ll respond soon.',
      sleeping:      'Owner is resting. Only emergencies will notify immediately — otherwise please leave a voice or text message.',
      baby:          'A baby is sleeping at home. Only emergencies will notify immediately — otherwise please leave a quiet message.',
      away:          'Owner is away from home. A voice note works best — they\'ll hear it as soon as possible.',
      out_of_town:   'Owner is out of town. Please leave a message — they\'ll get back to you.',
      out:           'Owner is out of town. Please leave a message — they\'ll get back to you.',
      leave_at_gate: 'Please leave the parcel safely at the entrance. Thank you!',
      parcel:        'Please leave the parcel safely at the entrance. Thank you!',
      vacation:      'Owner is on vacation right now. Messages will be answered once they\'re back.',
      driving:       'Owner is driving right now. Please leave a message — they\'ll call back shortly.',
      offline:       'Owner is currently offline. Please leave a message for a prompt response.',
    };
    return notes[status] || null;
  }

  let _aiSending = false; // double-submit guard
  // Per-session conversation history — keeps Priya context-aware and stops
  // her from repeating the same sentence within a conversation.
  let _aiConversationHistory = [];

  async function handleAISend(s) {
    if (_aiSending) return;
    const input = document.getElementById('ai-input');
    const text = input?.value?.trim();
    if (!text) return;
    _aiSending = true;
    input.value = '';
    const sendBtn = document.getElementById('ai-send');
    if (sendBtn) sendBtn.disabled = true;

    appendAIMsg(text, 'user');
    _aiConversationHistory.push({ role: 'user', content: text });

    // Thinking indicator (natural delay — feels less robotic, more human)
    const thinkId = 'think-' + Date.now();
    appendThinking(thinkId);
    const thinkingDelay = 450 + Math.random() * 550; // 450–1000ms
    await new Promise(r => setTimeout(r, thinkingDelay));

    // Detect visitor language for adaptive AI response
    const inputLang = detectLang(text);
    const profile = s.owner.profile || {};
    const aiName = profile.aiName || 'Priya';
    const ownerLabel = profile.familyName || profile.residenceName || s.owner.name || 'the resident';

    // Call Groq proxy
    let intentData = null;
    try {
      const supabaseUrl = window.__SD_CONFIG__?.supabaseUrl || '';
      const anonKey = window.__SD_CONFIG__?.supabaseAnon || '';
      if (supabaseUrl && anonKey) {
        const now        = new Date();
        const hour       = now.getHours();
        const timeOfDay  = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : hour < 21 ? 'evening' : 'night';
        const dayName    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
        const isWeekend  = now.getDay() === 0 || now.getDay() === 6;
        const ownerStatus = (s.securityRules?.current_status || 'available').toLowerCase();
        const historyLen  = _aiConversationHistory.filter(m => m.role === 'user').length;
        const isRepeat    = historyLen > 1;
        const isReturning = !!document.querySelector('[data-returning="true"]');

        const systemPrompt = `You are ${aiName}, a warm and professional AI receptionist for Smart Door — a premium home privacy system deployed at the residence of "${ownerLabel}" in India.

CURRENT CONTEXT:
- Time: ${timeOfDay} (${hour}:00), ${dayName}${isWeekend ? ' (weekend)' : ''}
- Owner status: ${ownerStatus.toUpperCase()}${s.securityRules?.custom_message ? ` — "${s.securityRules.custom_message}"` : ''}
- Greeting style: ${profile.greetingStyle || 'warm'}
- Preferred language: ${profile.preferredLanguage || 'hinglish'}
- Visitor language this message: ${inputLang === 'hi-IN' ? 'Hindi/Hinglish' : 'English'}
- Conversation turn: ${historyLen} (${isRepeat ? 'follow-up — do NOT repeat earlier greetings' : 'first message'})
${isReturning ? '- RETURNING VISITOR: This person has visited before — acknowledge familiarity warmly' : ''}

VISITOR INTENT DETECTION — classify into one of:
Courier (DTDC/BlueDart/India Post/SpeedPost), Amazon Delivery, Flipkart Delivery, Swiggy/Zomato Food, Milkman, Gas Cylinder, Maid/Domestic Help, Electrician/Plumber/Maintenance, Family/Relative, Friend/Acquaintance, Government Official, Salesperson/Canvasser, Medical Emergency, Unknown Visitor, Repeat Visitor, Child (alone), Elderly Visitor

OWNER STATUS RULES — follow strictly:
- AVAILABLE: Offer to notify owner immediately; ring bell if delivery/visitor
- BUSY / MEETING / DRIVING: Suggest voice or text message; owner will respond soon
- SLEEPING: Only SOS/emergency gets immediate action; all others → leave a message, do not disturb
- BABY (baby sleeping): Same as sleeping; remind visitor to be quiet
- AWAY / OUT_OF_TOWN / VACATION: Owner is not home; guide to leave parcel at gate or send a message
- LEAVE_AT_GATE / PARCEL: Direct delivery visitors to leave items at gate; do NOT ring bell
- OFFLINE: Owner unavailable; suggest leaving a message or calling back later

TIME-AWARE BEHAVIOUR:
- Night (21:00–07:00): Be quieter, suggest not disturbing unless emergency
- Morning: Greet warmly, expect deliveries
- Weekend: Owners may be sleeping late; gentle tone

LANGUAGE:
- Match the visitor's language naturally
- Hinglish: blend Hindi and English naturally in Roman script — never formal Urdu
- Never repeat a phrase you've used in this same conversation
- Vary phrasing every reply — like a real human receptionist would

Always reply ONLY with this valid JSON (no markdown, no backticks):
{"intent":"<classified intent>","priority":"Low|Normal|High|Critical","action":"Leave Message|Notify Owner|Ring Bell + Notify|Bypass All Rules|Blocked","color":"#hex","emoji":"<single emoji>","response":"<English 1-2 sentences>","hinglish_response":"<Hinglish Roman 1-2 sentences>","hindi_tts":"<pure Devanagari for TTS, no Roman>","confidence":0.9,"suggest_action":"bell|text|voice|call|none"}`;

        const res = await fetch(`${supabaseUrl}/functions/v1/groq-proxy`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` },
          body: JSON.stringify({
            // FIX (stabilization audit): llama3-70b-8192 was decommissioned by
            // Groq — every call to groq-proxy was failing and silently falling
            // back to mockClassify() below, so the AI receptionist never
            // actually used Groq despite the "Powered by GROQ AI" badge.
            model: 'llama-3.3-70b-versatile',
            max_tokens: 400,
            temperature: 0.6, // higher temp → more varied phrasing, avoids repeating
            messages: [
              { role: 'system', content: systemPrompt },
              // Send recent conversation history (last 6 turns) so AI has context
              // and naturally avoids repeating itself.
              ..._aiConversationHistory.slice(-6),
            ],
          }),
        });
        const data = await res.json();
        if (data?.success && data.content) {
          const clean = data.content.replace(/```json|```/g, '').trim();
          intentData = JSON.parse(clean);
        }
      }
    } catch {}

    document.getElementById(thinkId)?.remove();

    if (!intentData) {
      // Offline/mock fallback
      intentData = mockClassify(text);
    }

    // Render intent badge
    appendIntentBadge(intentData);

    // Dual-bubble: Hinglish primary + English subtitle
    const hinglishReply = intentData.hinglish_response || intentData.response || '';
    const englishReply  = intentData.response || '';
    appendAIMsg(hinglishReply, 'ai', intentData.color);
    if (englishReply && englishReply !== hinglishReply) {
      appendAIMsg(englishReply, 'ai-subtitle');
    }
    _aiConversationHistory.push({ role: 'assistant', content: hinglishReply });

    // TTS — always auto-speak after response (needs prior user gesture)
    const ttsText = intentData.hindi_tts || intentData.hindi_response || toHindi(intentData.response, intentData.intent);
    autoSpeak(ttsText, 'hi-IN');
    // Honour voiceEnabled for repeat/explicit speaks
    if (voiceEnabled && ttsText) speak(ttsText, 'hi-IN');

    // Persist detected intent — visitor_logs + visitor_memory (returning-visitor recognition)
    if (s.owner.id && s.plate.plateId) {
      try {
        await supabase.from('visitor_logs').insert({
          owner_id: s.owner.id, plate_id: s.plate.plateId,
          event_type: 'ai_conversation', user_agent: navigator.userAgent,
          ai_intent: intentData.intent || null,
          ai_confidence: intentData.confidence || null,
          ai_priority: intentData.priority || null,
        });
      } catch (_) {}
      try {
        const fp = _getVisitorFingerprint();
        await supabase.rpc('remember_visitor', {
          p_owner_id: s.owner.id, p_plate_id: s.plate.plateId,
          p_fingerprint: fp, p_intent: intentData.intent || null,
        });
      } catch (_) {}
    }

    // Auto-actions based on AI intent
    if (intentData.action === 'Blocked') {
      showToast('🚫 Visitor intent blocked by AI', 'error');
    } else if (intentData.priority === 'Critical' || intentData.intent === 'Emergency') {
      showToast('🚨 Emergency detected — alerting all contacts', 'error');
      // Auto-trigger SOS for critical intents detected by AI
      if (s.owner.id && s.plate.plateId) {
        getFamilyMembersForSos(s.plate.plateId).then(({ members }) => {
          triggerEmergency({ ownerId: s.owner.id, plateId: s.plate.plateId, familyMembers: members }).catch(() => {});
        });
      }
    } else if (intentData.suggest_action === 'bell' || intentData.action === 'Ring Bell + Notify') {
      // AI suggests ring bell — auto-ring
      if (s.owner.id && s.plate.plateId) {
        notifyBellRing(s.owner.id, s.plate.plateId).catch(() => {});
        _logVisitorEvent(s.owner.id, s.plate.plateId, 'bell_ring').catch(() => {});
        showToast('🔔 Bell auto-rung — owner notified by AI', 'info');
      }
    } else if (intentData.suggest_action === 'call') {
      // AI suggests calling — surface the call button visually
      document.getElementById('btn-call')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (intentData.suggest_action === 'text' || intentData.suggest_action === 'voice') {
      // AI suggests leaving a message — open unified message panel on the right tab
      openMessagePanel(intentData.suggest_action === 'voice' ? 'voice' : 'text');
    }

    // Log the conversational message as a low-priority record (keeps existing
    // message_logs flow intact for the dashboard's communication timeline)
    if (s.owner.id && s.plate.plateId) {
      sendTextMessage({
        ownerId: s.owner.id, plateId: s.plate.plateId, content: text,
        messageType: intentData.priority === 'Critical' ? 'emergency' : 'text',
      }).catch(() => {});

      // Mirror this AI-chat turn into the unified conversation (Phase 4
      // Inbox) — visitor's message, then the AI's reply, both tagged with
      // the detected intent so the owner Inbox can filter/tag by it.
      ensureConversation(s.owner.id, s.plate.plateId).then((cr) => {
        if (!cr.success) return;
        const meta = { intent: intentData.intent, priority: intentData.priority, confidence: intentData.confidence };
        sendConvMessage({ conversationId: cr.conversationId, ownerId: s.owner.id, plateId: s.plate.plateId, senderType: 'visitor', text, metadata: meta }).catch(() => {});
        sendConvMessage({ conversationId: cr.conversationId, ownerId: s.owner.id, plateId: s.plate.plateId, senderType: 'ai', senderName: (s.owner.profile?.aiName || 'Priya'), text: hinglishReply, aiGenerated: true, metadata: meta })
          .then((res) => {
            // AI Escalation push: 'Critical'/Emergency already triggers a
            // real SOS above (own EVENT_CONFIG entry) — this covers the
            // next tier down, where the AI could reply but flagged that it
            // couldn't fully resolve the visitor's need itself and the
            // owner's personal reply/call would help. Throttled server-side
            // (supabase/functions/send-push) so a chatty back-and-forth at
            // 'High' priority doesn't spam repeat pushes.
            const needsOwner = intentData.priority === 'High'
              || ['call', 'text', 'voice'].includes(intentData.suggest_action);
            if (needsOwner && res?.success && res.id) {
              _triggerPush(s.owner.id, s.plate.plateId, 'ai_escalation', res.id, cr.conversationId);
            }
          })
          .catch(() => {});
      });
    }

    // Release double-submit guard
    _aiSending = false;
    const _sendBtn = document.getElementById('ai-send');
    if (_sendBtn) _sendBtn.disabled = false;
  }

  function appendAIMsg(text, role, color) {
    const wrap = document.getElementById('chat-messages');
    if (!wrap) return;
    const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
    const div = document.createElement('div');
    div.className = `msg-row ${role}`;
    div.id = id;
    const timeStr = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const seenTick = role === 'user' ? '<span class="seen-tick" id="' + id + '-seen">✓</span>' : '';
    div.innerHTML = `
      <div class="msg-bubble" style="${color ? `border-color:${color}40;` : ''}">
        ${_esc(text)}
        <div class="msg-meta">${timeStr} ${seenTick}</div>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    // Simulate "seen" — double-tick after AI starts responding
    if (role === 'user') {
      setTimeout(() => {
        const tick = document.getElementById(id + '-seen');
        if (tick) { tick.textContent = '✓✓'; tick.style.color = '#00A2E8'; }
      }, 600);
    }
    return id;
  }

    const wrap = document.getElementById('chat-messages');

    div.innerHTML = `<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;

    wrap.scrollTop = wrap.scrollHeight;

  // ── Action bindings ──
  function bindActions(s) {
    const ownerId = s.owner.id;
    const plateId = s.plate.plateId;

    // CALL — Tap to Talk (WebRTC) with automatic masked-call fallback
    const btnCall = document.getElementById('btn-call');
    let cachedPhone = null;
    let activeRtcCall = null; // { endCall } while a WebRTC call is live
    btnCall?.addEventListener('click', async () => {
      if (btnCall.disabled) return;

      // If a WebRTC call is already connected, this tap ends it — mirrors
      // the existing masked-call button's single "Call" affordance rather
      // than adding a second button just for Phase 2.
      if (activeRtcCall) {
        activeRtcCall.endCall();
        activeRtcCall = null;
        document.getElementById('call-sub').textContent = 'Connect with the family';
        btnCall.disabled = !s.access?.allowCall;
        return;
      }

      let vPhone = cachedPhone;
      if (!vPhone) {
        const raw = window.prompt('Apna phone number darj karein (Aapka number surakshit rahega):');
        if (!raw) return;
        vPhone = raw.replace(/\D/g,'').slice(-10);
        if (vPhone.length !== 10) { showToast('Valid 10-digit phone number darj karein', 'error'); return; }
        cachedPhone = vPhone;
        // Visitor Memory System — best-effort recognition greeting only;
        // never blocks or delays the call itself.
        getVisitorRecognition(ownerId, vPhone).then((rec) => {
          if (rec.known) {
            showToast(`👋 Welcome back! Visit #${rec.visitCount + 1}`, 'success');
          }
        }).catch(() => {});
      }
      btnCall.disabled = true;
      document.getElementById('call-sub').textContent = 'Connecting…';
      _logVisitorEvent(ownerId, plateId, 'call_attempt');

      // Full-screen call overlay — purely presentational, driven by the
      // same onStatus()/onCallHandle hooks passed to attemptTapToTalk()
      // below. Shows nothing extra if WebRTC isn't attempted at all
      // (flag off / owner offline / mic denied resolve before any
      // status fires) — the existing masked-call fallback path is
      // unaffected either way.
      visitorCallUI.start({ label: `Door ${plateId}` });

      // Try WebRTC Tap to Talk first. attemptTapToTalk() is fully guarded —
      // it resolves { attempted: false } immediately (no mic prompt, no
      // channel) unless this owner is explicitly opted into WebRTC and
      // currently online, so this is a no-op path for every owner today.
      const rtc = await attemptTapToTalk({
        ownerId,
        plateId,
        remoteAudioEl: rtcRemoteAudio,
        onCallHandle: ({ cancel }) => {
          // Lets the visitor cancel a ringing/connecting call before the
          // owner answers — wired straight to the Cancel button that
          // appears on the "Ringing…" screen.
          visitorCallUI.setCancelHandle(cancel);
        },
        onStatus: (status) => {
          visitorCallUI.status(status);
          if (status === 'connecting') document.getElementById('call-sub').textContent = 'Connecting…';
          if (status === 'ringing') document.getElementById('call-sub').textContent = 'Ringing resident…';
          if (status === 'owner_answered') document.getElementById('call-sub').textContent = 'Owner answered…';
          // PRODUCTION HARDENING (Fix 2 + Fix 4): a temporary ICE drop
          // after the call was already connected. The peer connection is
          // still open — this is UI feedback only, no state reset.
          if (status === 'reconnecting') document.getElementById('call-sub').textContent = 'Reconnecting…';
          if (status === 'connected' && activeRtcCall) document.getElementById('call-sub').textContent = 'Connected — tap again to end';
          if (status === 'ended') {
            const durationSec = activeRtcCall?._connectedAt ? (Date.now() - activeRtcCall._connectedAt) / 1000 : 0;
            visitorCallUI.ended({ durationSec });
            activeRtcCall = null;
            document.getElementById('call-sub').textContent = 'Connect with the family';
            btnCall.disabled = !s.access?.allowCall;
          }
        },
      });

      if (rtc.attempted && rtc.connected) {
        activeRtcCall = { endCall: rtc.endCall, _connectedAt: Date.now() };
        visitorCallUI.connected({ localStream: rtc.localStream, endCall: rtc.endCall });
        document.getElementById('call-sub').textContent = 'Connected — tap again to end';
        showToast('🔊 Connected via SmartDoor Voice', 'success');
        if (voiceEnabled) speak('Aap resident se seedhe jud gaye hain.', 'hi-IN');
        btnCall.disabled = false;
        // Visitor Memory System — best-effort, never blocks the call UI.
        recordVisitorVisit({ ownerId, plateId, phone: vPhone, callType: 'webrtc', accepted: true }).catch(() => {});
        return;
      }

      // Visitor explicitly cancelled a ringing/connecting WebRTC call —
      // respect that choice and stop, same as tapping Cancel on the
      // existing masked-call flow would. Does not fall back to masked
      // calling, since that would place a call the visitor just said
      // to stop.
      if (rtc.reason === 'visitor_cancelled') {
        visitorCallUI.close();
        document.getElementById('call-sub').textContent = 'Connect with the family';
        btnCall.disabled = !s.access?.allowCall;
        return;
      }

      visitorCallUI.close();

      // WebRTC wasn't attempted (flag off / owner offline / mic denied) or
      // it failed/timed out/was rejected — automatically fall back to the
      // existing, unmodified masked-calling flow. No user action needed.
      console.warn(`[RTC-TRACE] 15 Fallback | File=visitor.html ownerId=${ownerId} plateId=${plateId} rtc.attempted=${rtc.attempted} rtc.connected=${rtc.connected} rtc.reason=${rtc.reason || 'n/a'} → initiateMaskedCall()`);
      const r = await initiateMaskedCall({ plateId, ownerId, visitorPhone: vPhone });
      if (r.success) {
        document.getElementById('call-sub').textContent = 'Connected — your number is hidden';
        showToast('📞 Connecting to resident…', 'success');
        if (voiceEnabled) speak('Aapki call connect ki ja rahi hai. Aapka number surakshit hai.', 'hi-IN');
      } else {
        document.getElementById('call-sub').textContent = 'Connect with the family';
        showToast(r.error || 'Call failed. Try again.', 'error');
      }
      // Visitor Memory System — best-effort, never blocks the call UI.
      recordVisitorVisit({ ownerId, plateId, phone: vPhone, callType: 'masked_call', accepted: !!r.success }).catch(() => {});
      btnCall.disabled = !s.access?.allowCall;
    });

    // BELL — with shake animation + full logging
    const btnBell = document.getElementById('btn-bell');
    btnBell?.addEventListener('click', async () => {
      if (btnBell.disabled) return;
      btnBell.disabled = true;
      const bellIcon = btnBell.querySelector('.action-icon');
      bellIcon?.classList.add('bell-ringing');
      setTimeout(() => bellIcon?.classList.remove('bell-ringing'), 700);
      document.getElementById('bell-sub').textContent = 'Ringing…';
      await Promise.allSettled([
        notifyBellRing(ownerId, plateId),
        _logVisitorEvent(ownerId, plateId, 'bell_ring'),
      ]);
      document.getElementById('bell-sub').textContent = 'Bell rung! Owner notified.';
      showToast('🔔 Bell rung — owner notified', 'success');
      if (voiceEnabled) speak('Darwazi ghanti baja di gayi hai. Maalik ko soochana mil gayi hai.', 'hi-IN');
      setTimeout(() => { document.getElementById('bell-sub').textContent = 'Alert the family'; btnBell.disabled = false; }, 900);
    });

    // UNIFIED MESSAGE PANEL — choose Text or Voice after tapping "LEAVE A MESSAGE"
    const msgPanel     = document.getElementById('text-msg-panel');
    const btnMessage   = document.getElementById('btn-message');
    const tabText      = document.getElementById('msg-tab-text');
    const tabVoice     = document.getElementById('msg-tab-voice');
    const textModePane = document.getElementById('msg-mode-text-panel');
    const voiceModePane= document.getElementById('msg-mode-voice-panel');
    const textInput    = document.getElementById('text-msg-input');

    window.openMessagePanel = function openMessagePanel(mode) {
      msgPanel?.classList.add('open');
      setMsgMode(mode || 'text');
      if ((mode || 'text') === 'text') setTimeout(() => textInput?.focus(), 80);
    };

    function setMsgMode(mode) {
      const isVoice = mode === 'voice';
      tabText?.classList.toggle('active', !isVoice);
      tabVoice?.classList.toggle('active', isVoice);
      if (textModePane) textModePane.style.display = isVoice ? 'none' : 'block';
      if (voiceModePane) voiceModePane.style.display = isVoice ? 'block' : 'none';
    }

    btnMessage?.addEventListener('click', () => {
      if (btnMessage.disabled) return;
      const isOpen = msgPanel?.classList.contains('open');
      if (isOpen) { msgPanel.classList.remove('open'); return; }
      openMessagePanel('text');
    });
    tabText?.addEventListener('click', () => setMsgMode('text'));
    tabVoice?.addEventListener('click', () => setMsgMode('voice'));

    // VOICE NOTE (inside the unified message panel)
    const btnVoice = document.getElementById('btn-voice');
    const voiceBar = document.getElementById('voice-bar');
    let recorder = null;
    btnVoice?.addEventListener('click', async () => {
      if (btnVoice.disabled) return;
      const icon  = document.getElementById('voice-record-icon');
      const label = document.getElementById('voice-record-label');
      if (!recorder) {
        try {
          recorder = await VoiceRecorder.start({
            maxDurationSecs: 10,
            onTick: (secs) => {
              document.getElementById('voice-timer').textContent = `${secs}s`;
              document.getElementById('voice-status-bar').textContent = `Recording… ${10-secs}s left`;
            },
          });
          voiceBar.classList.add('show');
          btnVoice.classList.add('recording');
          if (icon) icon.textContent = '⏺️';
          if (label) label.textContent = 'Recording… tap to stop & send';
          if (voiceEnabled) speak('Recording shuru ho gayi hai. Apna sandesh chhod dein.', 'hi-IN');
        } catch (err) {
          // FIX: a plain "Microphone permission was denied" red banner is a
          // dead end for a first-time visitor — they don't know this app,
          // don't want to dig into Chrome's site-permission settings at
          // someone's front door, and Text is right there as a fully
          // equivalent option. So: only the true "denied" case gets a soft,
          // actionable message + auto-switch to Text; every other mic error
          // (no hardware, busy, insecure context) still shows its precise
          // message from services/voiceNotes.js, since those aren't
          // permission problems the visitor can route around by retrying.
          if (err.wasPermissionDenied) {
            showToast('🎤 Mic access isn\'t available here — switched to Text so you can still send your message', 'info');
            setMsgMode('text');
            setTimeout(() => textInput?.focus(), 100);
          } else {
            showToast(err.message || 'Could not access the microphone.', 'error');
          }
        }
        return;
      }
      const { blob, durationSecs, mimeType } = await recorder.stop();
      recorder = null;
      voiceBar.classList.remove('show');
      btnVoice.classList.remove('recording');
      if (label) label.textContent = 'Uploading…';
      const cr = await ensureConversation(ownerId, plateId);
      const convId = cr.success ? cr.conversationId : null;
      const r = await uploadVoiceNote({ blob, durationSecs, ownerId, plateId, mimeType, conversationId: convId });
      // Mirror into the unified conversation (Phase 4 Inbox) — reuses the
      // same uploaded storage path, no second upload.
      if (r.success && r.voiceNote?.storagePath && convId) {
        sendConvVoiceMessage({
          conversationId: convId, ownerId, plateId, senderType: 'visitor',
          durationSecs, existingStoragePath: r.voiceNote.storagePath,
        }).catch(() => {});
      }
      if (r.success && r.voiceNote?.id) _triggerPush(ownerId, plateId, 'voice', r.voiceNote.id, convId);
      if (r.success) {
        if (icon) icon.textContent = '✅';
        if (label) label.textContent = 'Voice note sent!';
        showToast('🎤 Voice note sent', 'success');
        if (voiceEnabled) speak('Aapka voice sandesh bhej diya gaya hai.', 'hi-IN');
        setTimeout(() => { msgPanel?.classList.remove('open'); }, 1200);
      } else {
        if (label) label.textContent = 'Upload failed — tap to retry';
        showToast(r.error || 'Upload failed', 'error');
      }
      setTimeout(() => {
        if (icon) icon.textContent = '🎤';
        if (label && r.success) label.textContent = 'Tap to record (max 10s)';
      }, 3000);
    });

    // SOS — hold 2s
    const btnSos = document.getElementById('btn-sos');
    let sosTimer = null;
    const startHold = () => {
      btnSos.classList.add('holding');
      if (voiceEnabled) speak('SOS button daba rahe hain. Do second roken.', 'hi-IN');
      sosTimer = setTimeout(async () => {
        btnSos.classList.remove('holding');
        btnSos.disabled = true;
        _logVisitorEvent(ownerId, plateId, 'sos_triggered');
        const { members } = await getFamilyMembersForSos(plateId);
        const cr = await ensureConversation(ownerId, plateId);
        const r = await triggerEmergency({ ownerId, plateId, familyMembers: members, conversationId: cr.success ? cr.conversationId : null });
        if (r.success) {
          showToast('🚨 Emergency alert sent — help coming', 'success');
          if (voiceEnabled) speak('Aapaat sandesh bheja ja raha hai. Madad aa rahi hai!', 'hi-IN');
        } else {
          showToast(r.error || 'Emergency alert failed', 'error');
        }
        setTimeout(() => { btnSos.disabled = false; }, 10000);
      }, 2000);
    };
    const cancelHold = () => { btnSos.classList.remove('holding'); clearTimeout(sosTimer); };
    btnSos?.addEventListener('mousedown', startHold);
    btnSos?.addEventListener('touchstart', startHold, { passive: true });
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => btnSos?.addEventListener(ev, cancelHold));

    // TEXT MESSAGE — connected to Supabase
    const textSendBtn = document.getElementById('text-msg-send');

    const doSendText = async () => {
      const content = textInput?.value?.trim();
      if (!content) { showToast('Message khaali nahi ho sakta', 'error'); return; }
      textSendBtn.disabled = true;
      textSendBtn.textContent = 'Sending…';
      const cr = await ensureConversation(ownerId, plateId);
      const convId = cr.success ? cr.conversationId : null;
      const r = await sendTextMessage({ ownerId, plateId, content, messageType: 'text', conversationId: convId });
      // Mirror into the unified conversation (Phase 4 Inbox) — best-effort,
      // never blocks the existing send flow above.
      if (convId) sendConvMessage({ conversationId: convId, ownerId, plateId, senderType: 'visitor', text: content }).catch(() => {});
      if (r.success && r.id) _triggerPush(ownerId, plateId, 'text', r.id, convId);
      if (r.success) {
        textInput.value = '';
        msgPanel?.classList.remove('open');
        showToast('💬 Message sent to owner', 'success');
        if (voiceEnabled) speak('Aapka sandesh maalik ko bheja gaya hai.', 'hi-IN');
      } else {
        showToast(r.error || 'Message send failed', 'error');
      }
      textSendBtn.disabled = false;
      textSendBtn.textContent = 'Send Message →';
    };

    textSendBtn?.addEventListener('click', doSendText);
    textInput?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSendText(); }
    });
  }

  // Best-effort call to send-push (Phase 4c) so the owner gets a REAL
  // background push even if their dashboard/PWA is fully closed — the
  // foreground realtime path in services/notificationDispatcher.js only
  // fires while their app/tab is open. Never blocks or throws into the
  // caller; if Firebase isn't configured server-side this just no-ops.
  // `type` here is the push-event vocabulary (bell_ring|qr_scan|voice|text|sos),
  // matching EVENT_CONFIG in supabase/functions/send-push/index.ts exactly.
  function _triggerPush(ownerId, plateId, type, rowId, conversationId) {
    try {
      const supabaseUrl = window.__SD_CONFIG__?.supabaseUrl || '';
      const anonKey = window.__SD_CONFIG__?.supabaseAnon || '';
      if (!supabaseUrl || !anonKey || !rowId) return;
      fetch(`${supabaseUrl}/functions/v1/send-push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', apikey: anonKey, Authorization: `Bearer ${anonKey}` },
        body: JSON.stringify({ ownerId, plateId, type, rowId, conversationId }),
      }).catch(() => {});
    } catch (_) {}
  }

  async function _logVisitorEvent(ownerId, plateId, eventType) {
    try {
      const { supabase } = await import('./services/supabase.js');
      // Phase 4b: attach this event to the same unified conversation as
      // every other interaction from this visitor, and mirror it in as a
      // system message so doorbell/SOS show up in the owner's Inbox
      // timeline alongside text/voice/AI turns (Req 10), and so the OS
      // notification for this row can deep-link to the exact thread (Req 6).
      const cr = await ensureConversation(ownerId, plateId);
      const convId = cr.success ? cr.conversationId : null;

      // Explicit id so it can be reused as the push notification's tag
      // (Phase 4c) without a select-after-insert round trip — anon can't
      // read back its own visitor_logs row (RLS is owner-only for SELECT).
      const rowId = crypto.randomUUID();
      await supabase.from('visitor_logs').insert({
        id: rowId, owner_id: ownerId, plate_id: plateId, event_type: eventType,
        conversation_id: convId,
      });

      if (convId) {
        const SYSTEM_LABELS = {
          bell_ring: '🔔 Visitor rang the doorbell',
          sos_triggered: '🚨 SOS Emergency triggered — respond immediately',
        };
        const text = SYSTEM_LABELS[eventType];
        if (text) {
          sendConvMessage({
            conversationId: convId, ownerId, plateId, senderType: 'system', text,
            metadata: { event: eventType, priority: eventType === 'sos_triggered' ? 'critical' : 'high' },
          }).catch(() => {});
        }
      }

      const PUSH_TYPE = { bell_ring: 'bell_ring', sos_triggered: 'sos' };
      if (PUSH_TYPE[eventType]) _triggerPush(ownerId, plateId, PUSH_TYPE[eventType], rowId, convId);
    } catch {}
  }

  function showToast(message, kind = 'info') {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const t = document.createElement('div');
    t.className = `toast ${kind}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }

  function _esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
