<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Smart Door — Visitor Experience" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#060d1a" />
  <title>Smart Door</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: #060d1a;
      color: #e2ecf4;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,162,232,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,162,232,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .bg-glow-top {
      position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,162,232,0.13) 0%, transparent 70%);
      animation: bgPulse 6s ease-in-out infinite;
    }
    .bg-glow-bottom {
      position: absolute; bottom: -80px; right: -100px;
      width: 500px; height: 380px;
      background: radial-gradient(ellipse, rgba(200,160,40,0.07) 0%, transparent 70%);
    }
    .bg-scanline {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px, rgba(0,162,232,0.012) 2px, rgba(0,162,232,0.012) 4px
      );
      pointer-events: none;
    }
    @keyframes bgPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* ── Shell ── */
    .shell {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* ── Loading ── */
    .loading-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,162,232,0.15);
      border-top-color: #00A2E8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    .visitor-header {
      padding: 28px 20px 20px;
      text-align: center;
      position: relative;
    }
    .sd-logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 20px;
    }
    .sd-logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #C8A028, #E8C040);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(200,160,40,0.35);
    }
    .sd-logo-text {
      display: flex; flex-direction: column; text-align: left;
    }
    .sd-logo-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 1.1rem; letter-spacing: 1.5px;
      color: #C8A028;
    }
    .sd-logo-tagline {
      font-size: 0.6rem; letter-spacing: 1.5px; color: rgba(200,160,40,0.6);
      text-transform: uppercase; font-weight: 600;
    }
    .welcome-label {
      font-size: 0.9rem; color: rgba(226,236,244,0.55); font-weight: 400;
      margin-bottom: 6px; letter-spacing: 0.3px;
    }
    .owner-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.9rem; font-weight: 800;
      color: #00A2E8;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .owner-sub {
      font-size: 0.82rem; color: rgba(226,236,244,0.45);
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.73rem; font-weight: 600; letter-spacing: 0.3px;
      margin-top: 12px;
    }
    .status-badge.status-available { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .status-badge.status-busy      { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; }
    .status-badge.status-dnd       { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: dotPulse 2s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

    /* ── Section divider ── */
    .section-divider {
      margin: 0 20px 12px;
      border: none; border-top: 1px solid rgba(0,162,232,0.1);
    }

    /* ── Action buttons ── */
    .actions-wrap {
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 16px;
    }
    .action-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      cursor: pointer; color: inherit; text-align: left;
      transition: all 0.2s; width: 100%;
      backdrop-filter: blur(8px);
      position: relative; overflow: hidden;
    }
    .action-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,162,232,0.06) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }
    .action-btn:hover:not(:disabled)::before { opacity: 1; }
    .action-btn:hover:not(:disabled) {
      border-color: rgba(0,162,232,0.25);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .action-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .action-btn.primary-action {
      background: rgba(0,162,232,0.1);
      border-color: rgba(0,162,232,0.3);
    }
    .action-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .action-title { font-weight: 600; font-size: 0.95rem; color: #e2ecf4; margin-bottom: 2px; }
    .action-sub   { font-size: 0.75rem; color: rgba(226,236,244,0.45); }
    .action-arrow { font-size: 0.9rem; color: rgba(255,255,255,0.25); margin-left: auto; flex-shrink: 0; }
    .action-tag   { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.8px; color: rgba(0,162,232,0.7); flex-shrink: 0; }

    /* SOS */
    .action-btn.sos-btn {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
    }
    .action-btn.sos-btn .action-icon {
      background: linear-gradient(135deg,rgba(239,68,68,0.3),rgba(185,28,28,0.2));
      border: 1px solid rgba(239,68,68,0.4);
    }
    .action-btn.sos-btn:hover:not(:disabled) { border-color: rgba(239,68,68,0.5); }
    .sos-btn .sos-label { font-weight: 700; letter-spacing: 1.5px; color: #f87171; font-size: 0.8rem; }
    .action-btn.holding .action-icon { animation: sosPulse 0.4s ease-in-out infinite; }
    @keyframes sosPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

    /* ── AI Chat Section ── */
    .ai-section {
      margin: 8px 16px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,162,232,0.15);
      border-radius: 18px;
      overflow: hidden;
    }
    .ai-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(0,162,232,0.1);
      background: rgba(0,162,232,0.04);
    }
    .ai-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg,#00A2E8,#0066cc);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,162,232,0.4);
      position: relative;
    }
    .ai-avatar::after {
      content: ''; position: absolute;
      bottom: 1px; right: 1px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; border: 2px solid #060d1a;
    }
    .ai-header-text { flex: 1; }
    .ai-name { font-weight: 700; font-size: 0.85rem; color: #e2ecf4; }
    .ai-status-text { font-size: 0.7rem; color: rgba(0,162,232,0.7); }
    .ai-groq-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 1px;
      color: rgba(0,162,232,0.6); border: 1px solid rgba(0,162,232,0.2);
      padding: 2px 8px; border-radius: 8px;
    }
    .voice-toggle {
      background: none; border: 1px solid rgba(0,162,232,0.25);
      border-radius: 8px; padding: 4px 10px;
      color: rgba(0,162,232,0.7); font-size: 0.68rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .voice-toggle.active {
      background: rgba(0,162,232,0.15); border-color: rgba(0,162,232,0.4);
      color: #00A2E8;
    }

    /* Chat messages */
    .chat-messages {
      padding: 12px; display: flex; flex-direction: column; gap: 10px;
      min-height: 120px; max-height: 260px; overflow-y: auto;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,162,232,0.2); border-radius: 2px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 82%; padding: 9px 13px;
      border-radius: 16px; font-size: 0.83rem; line-height: 1.45;
      position: relative;
    }
    .msg-row.ai .msg-bubble {
      background: rgba(0,162,232,0.12);
      border: 1px solid rgba(0,162,232,0.2);
      border-bottom-left-radius: 4px;
      color: #c8dff0;
    }
    .msg-row.user .msg-bubble {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.2);
      border-bottom-right-radius: 4px;
      color: #a7f3c0;
    }
    .msg-row.thinking .msg-bubble {
      background: rgba(0,162,232,0.07);
      border: 1px solid rgba(0,162,232,0.12);
    }
    .msg-meta { font-size: 0.6rem; color: rgba(255,255,255,0.2); margin-top: 2px; text-align: center; }

    .intent-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 10px; font-size: 0.72rem; font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* Typing dots */
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgba(0,162,232,0.5); margin: 0 2px;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Chat input */
    .chat-input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid rgba(0,162,232,0.1);
      background: rgba(0,0,0,0.2);
    }
    .chat-input {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 9px 13px; color: #e2ecf4; font-size: 0.83rem;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: rgba(0,162,232,0.35); }
    .chat-input::placeholder { color: rgba(255,255,255,0.2); }
    .chat-send {
      background: linear-gradient(135deg,#00A2E8,#0077cc);
      border: none; border-radius: 10px;
      width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; color: #fff; font-size: 1rem;
    }
    .chat-send:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,162,232,0.4); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .mic-btn {
      background: rgba(0,162,232,0.1); border: 1px solid rgba(0,162,232,0.25);
      border-radius: 10px; width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; transition: all 0.2s; color: #00A2E8;
    }
    .mic-btn.recording { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; animation: micPulse 1s ease-in-out infinite; }
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }

    /* ── Banners ── */
    .night-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; margin: 0 16px 8px;
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.25);
      border-radius: 12px;
    }
    .expiry-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; margin: 0 16px 8px;
      border-radius: 12px;
    }
    .expiry-banner.grace  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); }
    .expiry-banner.locked { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25);  }

    /* ── Voice recording bar ── */
    #voice-bar {
      display: none; margin: 0 16px 8px;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px; align-items: center; gap: 10px;
    }
    #voice-bar.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #f87171; animation: recPulse 1s ease-in-out infinite; }
    @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Footer ── */
    .visitor-footer {
      margin-top: auto; padding: 16px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer-lock {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-bottom: 8px;
    }
    .footer-powered {
      font-size: 0.62rem; color: rgba(255,255,255,0.15); letter-spacing: 1px;
      text-transform: uppercase; font-family: 'Space Grotesk', sans-serif;
    }

    /* ── Pending screen ── */
    .pending-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 12px;
    }
    .pending-icon { font-size: 3rem; margin-bottom: 8px; }
    .pending-title { font-family: 'Space Grotesk',sans-serif; font-size: 1.3rem; font-weight: 700; }
    .pending-sub   { font-size: 0.83rem; color: rgba(226,236,244,0.5); line-height: 1.5; max-width: 280px; }
    .pending-stage { font-size: 0.75rem; color: rgba(0,162,232,0.6); padding: 6px 14px; border: 1px solid rgba(0,162,232,0.2); border-radius: 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 12px;
      font-size: 0.82rem; font-weight: 600; z-index: 9999;
      white-space: nowrap; animation: toastIn 0.3s ease;
      backdrop-filter: blur(12px);
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .toast.success { background: rgba(22,163,74,0.85); border: 1px solid rgba(34,197,94,0.4); color:#fff; }
    .toast.error   { background: rgba(185,28,28,0.85); border: 1px solid rgba(239,68,68,0.4); color:#fff; }
    .toast.info    { background: rgba(0,50,80,0.9);    border: 1px solid rgba(0,162,232,0.3); color:#7FD3FF; }
  </style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow-top"></div>
  <div class="bg-glow-bottom"></div>
  <div class="bg-scanline"></div>
</div>

<script src="config/env.generated.js"></script>
<script type="module" src="js/monitoring-bootstrap.js"></script>

<div class="shell" id="shell">
  <div class="loading-wrap" id="loading-state">
    <div class="spinner"></div>
    <div style="font-size:0.8rem;color:rgba(255,255,255,0.35);margin-top:4px;">Loading Smart Door…</div>
  </div>
</div>

<script type="module">
  import { resolveVisitorRoute, getFamilyMembersForSos } from './services/visitorExperience.js';
  import { initiateMaskedCall, sendTextMessage, triggerEmergency } from './services/communication.js';
  import { notifyBellRing } from './services/notifications.js';
  import { VoiceRecorder, uploadVoiceNote } from './services/voiceNotes.js';
  import { subscribeToStatusChanges } from './services/plates.js';
  import { isNightModeActive } from './services/security.js';

  const shell = document.getElementById('shell');
  const params = new URLSearchParams(window.location.search);
  const plateSlug = (params.get('plate') || '').trim().toUpperCase();

  // ── TTS: Hindi female voice AI receptionist ──
  let voiceEnabled = false;
  let speechSynth = window.speechSynthesis;
  let hindiVoice = null;

  function initVoice() {
    if (!speechSynth) return;
    const tryFind = () => {
      const voices = speechSynth.getVoices();
      // Priority: Hindi female > Hindi > any Indian English female > Google Hindi
      hindiVoice =
        voices.find(v => v.lang === 'hi-IN' && v.name.toLowerCase().includes('female')) ||
        voices.find(v => v.lang === 'hi-IN') ||
        voices.find(v => v.lang.startsWith('hi')) ||
        voices.find(v => v.lang === 'en-IN' && v.name.toLowerCase().includes('female')) ||
        voices.find(v => v.lang === 'en-IN') ||
        null;
    };
    tryFind();
    speechSynth.onvoiceschanged = tryFind;
  }

  function speak(text, lang = 'hi-IN') {
    if (!voiceEnabled || !speechSynth) return;
    speechSynth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 0.92;
    utt.pitch = 1.05;
    utt.volume = 1;
    if (hindiVoice) utt.voice = hindiVoice;
    speechSynth.speak(utt);
  }

  // Map English AI responses to Hindi TTS
  function toHindi(englishText, intent) {
    const map = {
      'Delivery':         'Aapka parcel sweekar kar liya gaya hai. Maalik ko soochana de di gayi hai. Dhanyavaad!',
      'Emergency / SOS':  'Aapaat sthiti detect hui hai! Maalik aur parivaar ke sadasyon ko turant soochit kiya ja raha hai. Shant rahein!',
      'Spam / Promotional': 'Khed hai, hum promotional ya vikray nivedan sweekar nahi karte. Kripya official channels se sampark karein.',
      'Known Guest / Family': 'Swagat hai! Maalik ko aapke aane ki soochana de di gayi hai. Kripya thoda pratiksha karein.',
      'General Visitor':  'Aapka swagat hai! Maalik ko soochana de di gayi hai. Kripya thodi der pratiksha karein.',
    };
    return map[intent] || 'Namaste! Aapka Smart Door mein swagat hai. Maalik ko soochana de di gayi hai.';
  }

  initVoice();

  let state = null;
  let unsubscribeStatus = null;

  init();

  async function init() {
    if (!plateSlug) { renderPending({ slug: '' }); return; }
    const result = await resolveVisitorRoute(plateSlug);
    if (!result.success) { renderPending({ slug: plateSlug }); return; }
    state = result;
    if (state.state === 'pending_activation') {
      renderPending(state);
    } else {
      renderVisitorExperience(state);
      unsubscribeStatus = subscribeToStatusChanges(state.owner.id, (rules) => {
        state.securityRules = { ...state.securityRules, ...rules };
        updateStatusBadge();
        updateNightBanner();
      });
    }
  }

  // ── Pending screen ──
  function renderPending(info) {
    shell.innerHTML = `
      <div class="pending-wrap">
        <div class="pending-icon">🚪</div>
        <div class="pending-title">Activation Pending</div>
        <div class="pending-sub">This Smart Door plate isn't active yet. If you're the resident, finish setup by logging in below.</div>
        ${info.pendingInfo ? `<div class="pending-stage">${_esc(info.pendingInfo.message || '')}</div>` : ''}
        <a href="/login.html${info.slug ? '?plate=' + info.slug : ''}" style="margin-top:20px;color:#00A2E8;font-size:0.85rem;font-weight:600;text-decoration:none;">Owner? Login to activate →</a>
        <div style="margin-top:36px;font-size:0.6rem;color:rgba(255,255,255,0.15);font-family:'Space Grotesk',sans-serif;letter-spacing:2px;">⊙ SMART DOOR</div>
      </div>`;
  }

  // ── Main visitor experience ──
  function renderVisitorExperience(s) {
    const access = s.access || { allowCall:true, allowVoice:true, allowSos:true, allowText:true };

    shell.innerHTML = `
      <!-- Header -->
      <div class="visitor-header">
        <div class="sd-logo-wrap">
          <div class="sd-logo-icon">🔒</div>
          <div class="sd-logo-text">
            <div class="sd-logo-name">SMART DOOR</div>
            <div class="sd-logo-tagline">Home Privacy. Smarter Living.</div>
          </div>
        </div>
        <div class="welcome-label">Welcome to</div>
        <div class="owner-name" id="owner-name-el">${_esc(s.owner.name)}</div>
        <div class="owner-sub">You are a valued visitor.</div>
        <div id="status-badge-wrap">
          <div class="status-badge ${st.cls}">
            <span class="status-dot"></span>
            <span>${_esc(statusText)}</span>
          </div>
        </div>
      </div>

      <!-- Banners -->
      <div id="night-banner-wrap"></div>
      <div id="expiry-banner-wrap"></div>

      <!-- Voice note recording bar -->
      <div id="voice-bar">
        <div class="rec-dot"></div>
        <div style="flex:1;font-size:0.8rem;color:#f87171;font-weight:600;" id="voice-status-bar">Recording…</div>
        <span id="voice-timer" style="font-size:0.75rem;color:rgba(248,113,113,0.7);font-family:monospace;"></span>
      </div>

      <!-- Action buttons -->
      <div class="actions-wrap">
        <button class="action-btn primary-action" id="btn-call" ${access.allowCall ? '' : 'disabled'}>
          <div class="action-icon" style="background:linear-gradient(135deg,rgba(0,162,232,0.2),rgba(0,120,215,0.12));border:1px solid rgba(0,162,232,0.3);">📞</div>
          <div style="flex:1;">
            <div class="action-title">CALL OWNER</div>
            <div class="action-sub" id="call-sub">Connect with the family</div>
          </div>
          <span class="action-tag">MASKED</span>
          <span class="action-arrow">›</span>
        </button>

        <button class="action-btn" id="btn-bell">
          <div class="action-icon" style="background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);">🔔</div>
          <div style="flex:1;">
            <div class="action-title">RING DOORBELL</div>
            <div class="action-sub" id="bell-sub">Alert the family</div>
          </div>
          <span class="action-arrow">›</span>
        </button>

        <button class="action-btn" id="btn-voice" ${access.allowVoice ? '' : 'disabled'}>
          <div class="action-icon" style="background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);">🎤</div>
          <div style="flex:1;">
            <div class="action-title">LEAVE A MESSAGE</div>
            <div class="action-sub" id="voice-sub">Voice message for the family</div>
          </div>
          <span class="action-arrow">›</span>
        </button>

        <button class="action-btn sos-btn" id="btn-sos" ${access.allowSos ? '' : 'disabled'}>
          <div class="action-icon">
            <span style="font-family:'Space Grotesk',sans-serif;font-weight:900;font-size:0.95rem;color:#f87171;letter-spacing:0;">SOS</span>
          </div>
          <div style="flex:1;">
            <div class="action-title" style="color:#f87171;">EMERGENCY SOS</div>
            <div class="action-sub">Get immediate help</div>
          </div>
          <span class="action-arrow" style="color:rgba(239,68,68,0.3);">›</span>
        </button>
      </div>

      <hr class="section-divider" />

      <!-- AI Chat Receptionist -->
      <div class="ai-section">
        <div class="ai-header">
          <div class="ai-avatar">🤖</div>
          <div class="ai-header-text">
            <div class="ai-name">Priya — AI Receptionist</div>
            <div class="ai-status-text">Online · Powered by GROQ AI</div>
          </div>
          <button class="voice-toggle" id="voice-toggle-btn" onclick="toggleVoice()">🔈 Voice</button>
          <span class="ai-groq-badge">GROQ</span>
        </div>

        <div class="chat-messages" id="chat-messages">
          <!-- Initial greeting injected by JS -->
        </div>

        <div class="chat-input-row">
          <button class="mic-btn" id="mic-btn" title="Speak your message">🎙️</button>
          <input class="chat-input" id="ai-input" type="text" placeholder="Type your purpose of visit…" maxlength="200" />
          <button class="chat-send" id="ai-send">➤</button>
        </div>

      <!-- Footer -->
      <div class="visitor-footer">
        <div class="footer-lock">
          🔒 Your privacy is our priority. Secure. Encrypted. Private.
        </div>
        <div class="footer-powered">⊙ Smart Door · Home Privacy · Smarter Living</div>

    `;

    // Init banners, bindings
    updateStatusBadge();
    updateNightBanner();
    updateExpiryBanner();
    bindActions(s);
    initAIChat(s);

  function updateStatusBadge() {
    const rules = state?.securityRules || {};
    const map = {
      available: { cls:'status-available', text:'Available — Will respond shortly' },
      busy:      { cls:'status-busy',      text:'Busy — Please leave a message' },
      sleeping:  { cls:'status-dnd',       text:'Sleeping — Only SOS accepted' },
      away:      { cls:'status-busy',      text:'Away — Voice note recommended' },
    };
    const st = map[rules.current_status] || map.available;
    const text = rules.custom_message || st.text;
    const wrap = document.getElementById('status-badge-wrap');
    if (wrap) wrap.innerHTML = `<div class="status-badge ${st.cls}"><span class="status-dot"></span><span>${_esc(text)}</span></div>`;
  }

  function updateNightBanner() {
    const wrap = document.getElementById('night-banner-wrap');
    if (!wrap) return;
    const active = isNightModeActive(state?.securityRules || {});
    wrap.innerHTML = active ? `
      <div class="night-banner">
        <span style="font-size:1.2rem;">🌙</span>
        <div>
          <div style="font-size:0.82rem;font-weight:700;color:#a5b4fc;font-family:'Space Grotesk',sans-serif;">Night Security Mode Active</div>
          <div style="font-size:0.72rem;color:rgba(165,180,252,0.6);">Only SOS calls accepted until morning</div>
        </div>
      </div>` : '';
  }

  function updateExpiryBanner() {
    const wrap = document.getElementById('expiry-banner-wrap');
    if (!wrap || !state?.access?.bannerMessage) return;
    const kind = state.access.bannerType === 'locked' ? 'locked' : 'grace';
    wrap.innerHTML = `
      <div class="expiry-banner ${kind}">
        <span style="font-size:1.1rem;">${kind === 'locked' ? '🔒' : '⏰'}</span>
        <div style="font-size:0.78rem;color:${kind==='locked'?'#fca5a5':'#fcd34d'};line-height:1.4;">${_esc(state.access.bannerMessage)}</div>
      </div>`;
  }

  // ── AI Chat Receptionist ──
  function initAIChat(s) {
    const ownerFirst = (s.owner.name || 'the resident').split(' ')[0];
    const greetings = [
      `Namaste! 🙏 Main Priya hoon, ${_esc(ownerFirst)} ji ka AI receptionist. Aap kaise madad kar sakti hoon?`,
      `Welcome! I'm Priya, the AI receptionist for ${_esc(s.owner.name)}. How can I help you today?`,
    ];
    // Show Hindi greeting first, then English subtitle
    appendAIMsg(greetings[0], 'ai');
    if (voiceEnabled) speak(greetings[0]);

    const sendBtn = document.getElementById('ai-send');
    const input   = document.getElementById('ai-input');
    const micBtn  = document.getElementById('mic-btn');

    sendBtn?.addEventListener('click', () => handleAISend(s));
    input?.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAISend(s); } });

    // Speech recognition (mic button)
    let recognition = null;
    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'hi-IN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onresult = (e) => {
        input.value = e.results[0][0].transcript;
        micBtn.classList.remove('recording');
        micBtn.title = 'Speak your message';
      };
      recognition.onerror = () => { micBtn.classList.remove('recording'); };
      recognition.onend = () => { micBtn.classList.remove('recording'); };
    }

    micBtn?.addEventListener('click', () => {
      if (!recognition) { showToast('Speech recognition not supported in this browser', 'info'); return; }
      if (micBtn.classList.contains('recording')) {
        recognition.stop(); micBtn.classList.remove('recording');
      } else {
        recognition.start(); micBtn.classList.add('recording');
        micBtn.title = 'Listening…';
      }
    });
  }

  async function handleAISend(s) {
    const input = document.getElementById('ai-input');
    const text = input?.value?.trim();
    if (!text) return;
    input.value = '';

    appendAIMsg(text, 'user');

    // Thinking indicator
    const thinkId = 'think-' + Date.now();
    appendThinking(thinkId);

    // Call Groq proxy
    let intentData = null;
    try {
      const supabaseUrl = window.__SD_CONFIG__?.supabaseUrl || '';
      const anonKey = window.__SD_CONFIG__?.supabaseAnon || '';
      if (supabaseUrl && anonKey) {
        const res = await fetch(`${supabaseUrl}/functions/v1/groq-proxy`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` },
          body: JSON.stringify({
            model: 'llama3-70b-8192',
            max_tokens: 300,
            temperature: 0.3,
            messages: [{
              role: 'system',
              content: `You are Priya, a smart AI receptionist for Smart Door. Analyze the visitor's message. Respond ONLY with valid JSON: {"intent":"Delivery|Emergency / SOS|Spam / Promotional|Known Guest / Family|General Visitor","priority":"Low|Normal|High|Critical","action":"Blocked|Notify Owner|Ring Bell + Notify|Bypass All Rules","color":"hex","emoji":"emoji","response":"short English response","hindi_response":"Hindi response in Devanagari script for TTS","confidence":0.0-1.0}`
            }, { role: 'user', content: text }],
          }),
        });
        const data = await res.json();
        if (data?.success && data.content) {
          const clean = data.content.replace(/```json|```/g, '').trim();
          intentData = JSON.parse(clean);
        }
      }
    } catch {}

    document.getElementById(thinkId)?.remove();

    if (!intentData) {
      // Offline/mock fallback
      intentData = mockClassify(text);
    }

    // Render intent badge + response
    appendIntentBadge(intentData);
    appendAIMsg(intentData.response, 'ai', intentData.color);

    // Hindi TTS
    const hindiText = intentData.hindi_response || toHindi(intentData.response, intentData.intent);
    if (voiceEnabled) speak(hindiText, 'hi-IN');

    // Auto-actions
    if (intentData.action === 'Blocked') {
      showToast('🚫 Visitor intent blocked by AI', 'error');
    } else if (intentData.priority === 'Critical') {
      showToast('🚨 Emergency detected — alerting all contacts', 'error');
    }

    // Log the message
    if (s.owner.id && s.plate.plateId) {
      sendTextMessage({
        ownerId: s.owner.id, plateId: s.plate.plateId, content: text,
        messageType: intentData.priority === 'Critical' ? 'emergency' : 'text',
      }).catch(() => {});
    }
  }

  function appendAIMsg(text, role, color) {
    const wrap = document.getElementById('chat-messages');
    if (!wrap) return;
    const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
    const div = document.createElement('div');
    div.className = `msg-row ${role}`;
    div.id = id;
    const timeStr = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `
      <div class="msg-bubble" style="${color ? `border-color:${color}40;` : ''}">
        ${_esc(text)}
        <div class="msg-meta">${timeStr}</div>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return id;
  }

  function appendThinking(id) {
    const wrap = document.getElementById('chat-messages');
    if (!wrap) return;
    const div = document.createElement('div');
    div.className = 'msg-row ai thinking';
    div.id = id;
    div.innerHTML = `<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function appendIntentBadge(d) {
    const wrap = document.getElementById('chat-messages');
    if (!wrap) return;
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;justify-content:center;margin:4px 0;';
    div.innerHTML = `
      <div class="intent-badge" style="background:${d.color}18;border-color:${d.color}40;color:${d.color};">
        ${d.emoji} ${_esc(d.intent)} · ${_esc(d.priority)}
        <span style="opacity:0.6;font-size:0.6rem;">${Math.round((d.confidence||0)*100)}%</span>
      </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  window.toggleVoice = function() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById('voice-toggle-btn');
    if (btn) {
      btn.textContent = voiceEnabled ? '🔊 Voice On' : '🔈 Voice';
      btn.classList.toggle('active', voiceEnabled);
    }
    if (voiceEnabled) {
      speak('Awaaj feature chalu kar diya gaya hai. Main Priya, aapki madad ke liye hoon!', 'hi-IN');
      showToast('🔊 Hindi voice enabled', 'success');
    } else {
      speechSynth?.cancel();
      showToast('🔈 Voice disabled', 'info');
    }
  };

  // ── Mock classifier ──
  function mockClassify(text) {
    const t = text.toLowerCase();
    if (['emergency','sos','help','fire','accident','urgent'].some(k=>t.includes(k))) return { intent:'Emergency / SOS', priority:'Critical', action:'Bypass All Rules', color:'#EF4444', emoji:'🚨', response:'Emergency detected! Alerting all family members immediately. Please stay calm.', hindi_response:'Aapaat sthiti detect hui hai! Turant madad bheji ja rahi hai. Shant rahein!', confidence:0.97 };
    if (['deliver','parcel','amazon','courier','flipkart','food','swiggy','zomato','box'].some(k=>t.includes(k))) return { intent:'Delivery', priority:'Normal', action:'Notify Owner', color:'#F59E0B', emoji:'📦', response:'Please leave the parcel at the gate. Owner has been notified.', hindi_response:'Kripya parcel darwaze par chhod dein. Maalik ko soochana de di gayi hai.', confidence:0.91 };
    if (['sell','loan','insurance','offer','discount','promotion'].some(k=>t.includes(k))) return { intent:'Spam / Promotional', priority:'Low', action:'Blocked', color:'#EF4444', emoji:'🚫', response:'We do not accept promotional requests. Thank you.', hindi_response:'Maafi chahte hain, hum promotional nivedan sweekar nahi karte.', confidence:0.93 };
    if (['family','friend','relative','guest','visit','know'].some(k=>t.includes(k))) return { intent:'Known Guest / Family', priority:'High', action:'Ring Bell + Notify', color:'#22C55E', emoji:'👨‍👩‍👧', response:'Welcome! Owner notified of your arrival.', hindi_response:'Aapka swagat hai! Maalik ko aapke aane ki soochana de di gayi hai.', confidence:0.88 };
    return { intent:'General Visitor', priority:'Normal', action:'Notify Owner', color:'#00A2E8', emoji:'👋', response:'Thank you for visiting! The owner has been notified.', hindi_response:'Aapka swagat hai! Maalik ko soochana de di gayi hai. Kripya pratiksha karein.', confidence:0.82 };
  }

  // ── Action bindings ──
  function bindActions(s) {
    const ownerId = s.owner.id;
    const plateId = s.plate.plateId;

    // CALL
    const btnCall = document.getElementById('btn-call');
    let cachedPhone = null;
    btnCall?.addEventListener('click', async () => {
      if (btnCall.disabled) return;
      let vPhone = cachedPhone;
      if (!vPhone) {
        const raw = window.prompt('Apna phone number darj karein (Aapka number surakshit rahega):');
        if (!raw) return;
        vPhone = raw.replace(/\D/g,'').slice(-10);
        if (vPhone.length !== 10) { showToast('Valid 10-digit phone number darj karein', 'error'); return; }
        cachedPhone = vPhone;
      }
      btnCall.disabled = true;
      document.getElementById('call-sub').textContent = 'Connecting…';
      const r = await initiateMaskedCall({ plateId, ownerId, visitorPhone: vPhone });
      if (r.success) {
        document.getElementById('call-sub').textContent = 'Connected — your number is hidden';
        showToast('📞 Connecting to resident…', 'success');
        if (voiceEnabled) speak('Aapki call connect ki ja rahi hai. Aapka number surakshit hai.', 'hi-IN');
      } else {
        document.getElementById('call-sub').textContent = 'Connect with the family';
        showToast(r.error || 'Call failed. Try again.', 'error');
      }
      btnCall.disabled = !s.access?.allowCall;
    });

    // BELL
    const btnBell = document.getElementById('btn-bell');
    btnBell?.addEventListener('click', async () => {
      btnBell.disabled = true;
      await Promise.allSettled([notifyBellRing(ownerId, plateId), _logVisitorEvent(ownerId, plateId, 'bell_ring')]);
      document.getElementById('bell-sub').textContent = 'Bell rung! Owner notified.';
      showToast('🔔 Bell rung — owner notified', 'success');
      if (voiceEnabled) speak('Darwazi ghanti baja di gayi hai. Maalik ko soochana mil gayi hai.', 'hi-IN');
      setTimeout(() => { document.getElementById('bell-sub').textContent = 'Alert the family'; btnBell.disabled = false; }, 4000);
    });

    // VOICE NOTE
    const btnVoice = document.getElementById('btn-voice');
    const voiceBar = document.getElementById('voice-bar');
    let recorder = null;
    btnVoice?.addEventListener('click', async () => {
      if (btnVoice.disabled) return;
      if (!recorder) {
        try {
          recorder = await VoiceRecorder.start({
            maxDurationSecs: 10,
            onTick: (secs) => {
              document.getElementById('voice-timer').textContent = `${secs}s`;
              document.getElementById('voice-status-bar').textContent = `Recording… ${10-secs}s left`;
            },
          });
          voiceBar.classList.add('show');
          document.getElementById('voice-sub').textContent = 'Tap again to stop & send';
          btnVoice.style.borderColor = 'rgba(239,68,68,0.4)';
          if (voiceEnabled) speak('Recording shuru ho gayi hai. Apna sandesh chhod dein.', 'hi-IN');
        } catch (err) { showToast(err.message || 'Microphone denied', 'error'); }
        return;
      }
      const { blob, durationSecs, mimeType } = await recorder.stop();
      recorder = null;
      voiceBar.classList.remove('show');
      btnVoice.style.borderColor = '';
      document.getElementById('voice-sub').textContent = 'Uploading…';
      const r = await uploadVoiceNote({ blob, durationSecs, ownerId, plateId, mimeType });
      if (r.success) {
        document.getElementById('voice-sub').textContent = 'Voice note sent ✅';
        showToast('🎤 Voice note sent', 'success');
        if (voiceEnabled) speak('Aapka voice sandesh bhej diya gaya hai.', 'hi-IN');
      } else {
        document.getElementById('voice-sub').textContent = 'Voice message for the family';
        showToast(r.error || 'Upload failed', 'error');
      }
      setTimeout(() => { document.getElementById('voice-sub').textContent = 'Voice message for the family'; }, 4000);
    });

    // SOS — hold 2s
    const btnSos = document.getElementById('btn-sos');
    let sosTimer = null;
    const startHold = () => {
      btnSos.classList.add('holding');
      if (voiceEnabled) speak('SOS button daba rahe hain. Do second roken.', 'hi-IN');
      sosTimer = setTimeout(async () => {
        btnSos.classList.remove('holding');
        btnSos.disabled = true;
        const { members } = await getFamilyMembersForSos(plateId);
        const r = await triggerEmergency({ ownerId, plateId, familyMembers: members });
        if (r.success) {
          showToast('🚨 Emergency alert sent — help coming', 'success');
          if (voiceEnabled) speak('Aapaat sandesh bheja ja raha hai. Madad aa rahi hai!', 'hi-IN');
        } else {
          showToast(r.error || 'Emergency alert failed', 'error');
        }
        setTimeout(() => { btnSos.disabled = false; }, 10000);
      }, 2000);
    };
    const cancelHold = () => { btnSos.classList.remove('holding'); clearTimeout(sosTimer); };
    btnSos?.addEventListener('mousedown', startHold);
    btnSos?.addEventListener('touchstart', startHold, { passive: true });
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => btnSos?.addEventListener(ev, cancelHold));
  }

  async function _logVisitorEvent(ownerId, plateId, eventType) {
    try {
      const { supabase } = await import('./services/supabase.js');
      await supabase.from('visitor_logs').insert({ owner_id: ownerId, plate_id: plateId, event_type: eventType });
    } catch {}
  }

  function showToast(message, kind = 'info') {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const t = document.createElement('div');
    t.className = `toast ${kind}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3200);
  }

  function _esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
