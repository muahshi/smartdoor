# ============================================================
# .github/workflows/deploy-functions.yml
# SmartDoor — Supabase Edge Functions Deploy
# ============================================================

name: Deploy Supabase Edge Functions

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      # ── Functions that require JWT (owner/visitor facing) ──────────────────
      - name: Deploy verify-pin
        run: supabase functions deploy verify-pin --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy set-owner-pin
        run: supabase functions deploy set-owner-pin --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy owner-forgot-pin
        run: supabase functions deploy owner-forgot-pin --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy activate-subscription
        run: supabase functions deploy activate-subscription --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-login
        run: supabase functions deploy admin-login --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-plate-status
        run: supabase functions deploy admin-plate-status --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-reset-pin
        run: supabase functions deploy admin-reset-pin --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-transfer-ownership
        run: supabase functions deploy admin-transfer-ownership --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-fullfilment-status
        run: supabase functions deploy admin-fullfilment-status --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-print-pack
        run: supabase functions deploy admin-print-pack --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy razorpay-refund
        run: supabase functions deploy razorpay-refund --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Admin data (THE main admin reads/writes — service_role) ────────────
      - name: Deploy admin-data
        run: supabase functions deploy admin-data --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Functions that skip JWT (public endpoints / cron) ──────────────────
      - name: Deploy generate-qr (no-verify-jwt)
        run: supabase functions deploy generate-qr --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy groq-proxy (no-verify-jwt)
        run: supabase functions deploy groq-proxy --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-email (no-verify-jwt)
        run: supabase functions deploy send-email --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-sms (no-verify-jwt)
        run: supabase functions deploy send-sms --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-whatsapp (no-verify-jwt)
        run: supabase functions deploy send-whatsapp --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy verify-razorpay-payment (no-verify-jwt)
        run: supabase functions deploy verify-razorpay-payment --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy create-razorpay-order (no-verify-jwt)
        run: supabase functions deploy create-razorpay-order --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy renewal-engine-cron (no-verify-jwt)
        run: supabase functions deploy renewal-engine-cron --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy health-check (no-verify-jwt)
        run: supabase functions deploy health-check --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy initiate-call (no-verify-jwt)
        run: supabase functions deploy initiate-call --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy call-status-webhook (no-verify-jwt)
        run: supabase functions deploy call-status-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Admin functions (JWT required — admin portal) ───────────────────────
      - name: Deploy admin-provision-customer
        run: supabase functions deploy admin-provision-customer --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-bulk-provision
        run: supabase functions deploy admin-bulk-provision --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy admin-analytics
        run: supabase functions deploy admin-analytics --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── PRODUCTION-STABILITY FIX: these functions existed in the repo
      # (fully implemented) but were never added to this workflow, so they
      # were never deployed. Root cause of: get-turn-credentials 404s
      # (WebRTC TURN always fell back to STUN-only), background FCM push
      # never sending (send-push), Razorpay payment webhooks never landing
      # (razorpay-webhook — payments could show "pending" forever), and the
      # whole SaaS subscription billing flow (create/verify/manage/cancel)
      # being unreachable in production. Matched each to the JWT model its
      # own file header documents (owner sessions here are Plate ID + PIN,
      # not Supabase Auth, so these follow the same convention as the
      # already-deployed activate-subscription/initiate-call).
      - name: Deploy get-turn-credentials (no-verify-jwt)
        run: supabase functions deploy get-turn-credentials --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy send-push (no-verify-jwt)
        run: supabase functions deploy send-push --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy razorpay-webhook (no-verify-jwt)
        run: supabase functions deploy razorpay-webhook --no-verify-jwt --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy create-subscription-order
        run: supabase functions deploy create-subscription-order --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy verify-subscription-payment
        run: supabase functions deploy verify-subscription-payment --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy manage-subscription
        run: supabase functions deploy manage-subscription --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy cancel-pending-order
        run: supabase functions deploy cancel-pending-order --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment complete
        run: echo "✅ All 33 Edge Functions deployed successfully (including admin-data)"
